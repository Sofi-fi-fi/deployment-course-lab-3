name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Dotnet format
        run: dotnet format src/mywebapp/mywebapp.csproj --verify-no-changes --verbosity diagnostic

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: shellcheck scripts/install.sh scripts/migrate.sh

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: yamllint docker-compose.yml .github/workflows/

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/mywebapp.Tests/mywebapp.Tests.csproj

      - name: Run tests with coverage
        run: |
          dotnet test src/mywebapp.Tests/ \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=./coverage/coverage.xml \
            /p:Threshold=40 \
            /p:ThresholdType=line \
            --verbosity normal

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate JSON coverage report
        run: |
          reportgenerator \
            -reports:./coverage/coverage.xml \
            -targetdir:./coverage/report \
            -reporttypes:JsonSummary

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage/report/