name: CI/CD

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Check C# formatting
        run: dotnet format src/mywebapp/mywebapp.csproj --verify-no-changes --verbosity diagnostic

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: shellcheck scripts/install.sh scripts/migrate.sh

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: yamllint docker-compose.yml .github/workflows/

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/mywebapp.Tests/mywebapp.Tests.csproj

      - name: Run tests with coverage
        run: |
          dotnet test src/mywebapp.Tests/ \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=./coverage/coverage.xml \
            /p:Threshold=40 \
            /p:ThresholdType=line \
            --verbosity normal

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate JSON coverage report
        run: |
          reportgenerator \
            -reports:src/mywebapp.Tests/coverage/coverage.xml \
            -targetdir:./coverage/report \
            -reporttypes:JsonSummary

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./coverage/report/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy
    runs-on: [self-hosted, lab3]
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/lab3_deploy
          chmod 600 ~/.ssh/lab3_deploy

      - name: Pull new image on target
        run: |
          ssh -i ~/.ssh/lab3_deploy \
              -o StrictHostKeyChecking=no \
              deploy@${{ secrets.TARGET_HOST }} \
              "docker pull ghcr.io/sofi-fi-fi/deployment-course-lab-3:${{ github.ref_name }}"

      - name: Update systemd unit with new tag
        run: |
          ssh -i ~/.ssh/lab3_deploy \
              -o StrictHostKeyChecking=no \
              deploy@${{ secrets.TARGET_HOST }} \
              "sudo sed -i 's|:.*$|:${{ github.ref_name }}|' /etc/systemd/system/mywebapp.service \
               && sudo systemctl daemon-reload \
               && sudo systemctl restart mywebapp.service"

      - name: Wait for app to start
        run: sleep 15

  verify:
    name: Verify
    runs-on: [self-hosted, lab3]
    needs: [deploy]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run verification script
        run: |
          chmod +x scripts/verify.sh
          bash scripts/verify.sh ${{ secrets.TARGET_HOST }}

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/lab3_deploy
